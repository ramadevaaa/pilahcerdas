<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a4a30" />
      <stop offset="100%" stop-color="#2d7a4f" />
    </linearGradient>
    <!-- Leaf Glow Gradient -->
    <linearGradient id="leafGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8f5ee" />
      <stop offset="100%" stop-color="#2d7a4f" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background Rounded Square (Premium Soft Radius) -->
  <rect width="100" height="100" rx="28" fill="url(#bgGrad)" />
  <!-- Minimalist Leaf base -->
  <path d="M50 22 C66 22 76 34 76 50 C76 66 61 76 50 76 C39 76 24 66 24 50 C24 34 34 22 50 22 Z" fill="none" stroke="url(#leafGrad)" stroke-width="3" stroke-linecap="round" filter="url(#glow)" />
  <!-- Lightbulb element inside representing energy/smart -->
  <path d="M50 34 C57 34 61 39 61 46 C61 52 56 55 54 59 L54 64 L46 64 L46 59 C44 55 39 52 39 46 C39 39 43 34 50 34 Z" fill="none" stroke="#f5a623" stroke-width="3.5" stroke-linecap="round" filter="url(#glow)" stroke-linejoin="round" />
  <!-- Filament line -->
  <path d="M47 46 L50 43 L53 46" fill="none" stroke="#f5a623" stroke-width="2" stroke-linecap="round" />
  <!-- Metal bulb base -->
  <line x1="45" y1="68" x2="55" y2="68" stroke="#e8f5ee" stroke-width="3.5" stroke-linecap="round" />
  <line x1="48" y1="72" x2="52" y2="72" stroke="#e8f5ee" stroke-width="2.5" stroke-linecap="round" />
</svg>